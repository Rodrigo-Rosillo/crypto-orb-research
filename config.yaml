# Project run configuration (single source of truth)

symbol: SOLUSDT
timeframe: 30m

timezone:
  data_timezone: "UTC"          # what timezone your CSV timestamps represent
  orb_times_timezone: "UTC"     # timezone for the ORB times below (usually same as data_timezone)

adx:
  period: 14

signals:
  rules:
    - signal_type: uptrend_reversion
      signal: 1
      trend: uptrend
      trigger: close_below_orb_low
      adx_threshold: 35
      orb:
        start: "12:30"
        end: "13:00"
        cutoff: "13:00"

    - signal_type: downtrend_reversion
      signal: -2
      trend: downtrend
      trigger: close_above_orb_high
      adx_threshold: 44
      orb:
        start: "13:00"
        end: "13:30"
        cutoff: "13:30"

    - signal_type: downtrend_breakdown
      signal: -1
      trend: downtrend
      trigger: close_below_orb_low
      adx_threshold: 43
      orb:
        start: "13:30"
        end: "14:00"
        cutoff: "14:00"

    - signal_type: uptrend_continuation
      signal: 2
      trend: uptrend
      trigger: close_above_orb_high
      adx_threshold: 29
      orb:
        start: "14:00"
        end: "14:30"
        cutoff: "14:30"

risk:
  initial_capital: 10000
  position_size: 0.95          # fraction of capital used per trade (example)

fees:
  taker_fee_rate: 0.0005       # 0.05% = 0.0005

leverage:
  enabled: false
  max_leverage: 1              # keep 1 if disabled

# Phase 4: risk controls (disabled by default for research)
risk_controls:
  enabled: false

  # Hard controls
  max_position_margin_frac: 0.25   # cap initial margin per trade (fraction of equity)
  max_leverage: 2.0                # cap leverage (engine will clamp)
  max_daily_loss_pct: 0.03         # stop trading for the day after -3% equity
  max_drawdown_pct: 0.20           # global circuit breaker after -20% from peak
  max_consecutive_losses: 4        # stop trading for the day
  max_exposure_bars: 48            # max bars in position (48 x 30m = 24h)

  kill_switch:
    max_data_gap_bars: 2           # data feed stale if gap > 2 bars
    max_order_rejects_per_day: 3   # backtest approximation
    max_margin_ratio: 0.85         # maintenance / margin_balance threshold
