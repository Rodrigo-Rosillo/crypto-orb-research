# Phase 5 preset: forward test (paper/shadow)
#
# This file is a convenience preset. You can also use config.yaml or config_phase4.yaml;
# scripts/forward_test.py will apply reasonable defaults if `forward_test:` is missing.

symbol: SOLUSDT
timeframe: 30m

# Data quality gate (Phase 0)
valid_days: data/processed/valid_days.csv

timezone:
  data_timezone: "UTC"
  orb_times_timezone: "UTC"

orb:
  start: "13:30"
  end: "14:00"
  cutoff: "14:00"

adx:
  period: 14
  threshold: 43

risk:
  initial_capital: 10000
  # For forward tests, keep sizing conservative. This is a *fraction of free balance used as initial margin*.
  position_size: 0.20

fees:
  taker_fee_rate: 0.0005

leverage:
  enabled: true
  max_leverage: 1

# Phase 4 risk controls (recommended ON for forward tests)
risk_controls:
  enabled: true
  max_position_margin_frac: 0.15
  max_leverage: 2.0
  max_daily_loss_pct: 0.02
  max_drawdown_pct: 0.15
  max_consecutive_losses: 3
  max_exposure_bars: 48
  kill_switch:
    max_data_gap_bars: 2
    max_order_rejects_per_day: 2
    max_margin_ratio: 0.80

# Phase 5 forward test settings
forward_test:
  # Mode:
  #   - shadow: generate orders, simulate fills (no exchange)
  #   - testnet: send orders to an exchange testnet (implemented in Phase 5 later steps)
  mode: shadow

  # Source:
  #   - replay: read candles from local parquet (deterministic)
  #   - live: connect to live market data (Phase 5 Step 3)
  source: replay

  # Replay window (optional). If omitted, uses full dataset.
  # You can also override from CLI:
  #   python scripts/forward_test.py --start 2025-01-01 --end 2025-06-30
  replay:
    start: null
    end: null

  # Output root (a run_id folder will be created under this)
  out_dir: reports/forward_test

  # How many recent bars to keep for indicator context
  bar_lookback: 1000

  # Live market ingestion settings (Step 3)
  live:
    # futures is recommended for SOLUSDT perpetual market-data consistency
    market: futures
    # REST bootstrap window (closed candles only)
    bootstrap_limit: 1000
    # Bootstrap freshness validation. If null/omitted, defaults to kill_switch.max_data_gap_bars.
    # Example: with 30m bars and bootstrap_max_age_bars=1, bootstrap must be <= 30 minutes old.
    bootstrap_max_age_bars: null
    # Websocket reconnect backoff cap
    max_backoff_seconds: 60
    # Heartbeat warning if no closed candles are received for this many seconds
    heartbeat_seconds: 120
    # How often to check for staleness (seconds)
    stale_check_interval_seconds: 30

  # Binance Futures TESTNET settings (Step 4)
  # IMPORTANT: API keys must be provided via env vars, never config files:
  #   - BINANCE_TESTNET_API_KEY
  #   - BINANCE_TESTNET_API_SECRET
  testnet:
    # USD-M futures testnet base URL
    base_url: "https://testnet.binancefuture.com"
    recv_window_ms: 5000
    # How often to poll order/position status during live runs (seconds)
    poll_interval_seconds: 2
    # Cancel open reduce-only TP/SL orders when the script exits
    cancel_open_orders_on_exit: true
    # If state/exchange mismatch is detected at startup, optionally flatten and exit (safer = false)
    flatten_on_mismatch: false

    # Smoke test (places tiny order then flattens)
    smoke_qty: 0.10
    smoke_auto_flatten: true

    # Rate limit / retry tuning
    max_retries: 6
    base_backoff_seconds: 0.5
    max_backoff_seconds: 20

  # Shadow execution model defaults (kept aligned with backtest assumptions)
  execution_model:
    delay_bars: 1
    slippage_bps: 0
