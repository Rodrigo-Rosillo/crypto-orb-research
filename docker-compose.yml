services:
  trader:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - trader_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "find /data/heartbeat -mmin -5 -type f | grep -q ."]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m
volumes:
  trader_data:
    driver: local
